name: Bug report
description: Report a reproducible bug in one of the packages.
title: "[Bug]: "
labels: ["bug"]
body:
  - type: dropdown
    id: package
    attributes:
      label: Package
      options:
        - "@yadimon/codex-to-llm"
        - "@yadimon/codex-to-llm-server"
    validations:
      required: true
  - type: textarea
    id: summary
    attributes:
      label: Summary
    validations:
      required: true
  - type: textarea
    id: reproduction
    attributes:
      label: Reproduction
      description: Include commands, payloads, and expected vs actual behavior.
    validations:
      required: true
  - type: textarea
    id: environment
    attributes:
      label: Environment
      description: Node version, OS, package version, and other relevant details.
